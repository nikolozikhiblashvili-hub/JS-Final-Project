<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Authentication</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <!-- Header -->
    <header>
      <h1>khibla restaurant</h1>
      <div class="user-info">
        <div id="userDisplayArea" class="hidden">
          <div class="user-welcome">
            Welcome, <strong id="userDisplayName"></strong>
          </div>
        </div>
        <div id="notLoggedInArea">
          <div class="user-welcome">Not logged in</div>
        </div>
        <button id="logoutBtn" class="logout-btn hidden" onclick="logout()">
          Logout
        </button>
      </div>
    </header>
 
    <!-- Main Container -->
    <div class="container">
      <!-- Register Form -->
      <div id="registerForm" class="auth-box">
        <h2 class="form-title">Register</h2>
        <form onsubmit="handleRegister(event)">
          <div class="form-group">
            <label for="regPhoneNumber">Phone Number</label>
            <input
              type="tel"
              id="regPhoneNumber"
              name="phoneNumber"
              required
              placeholder="+995-5XX-XXX-XXX"
            />
          </div>
 
          <div class="form-group">
            <label for="regEmail">Email</label>
            <input
              type="email"
              id="regEmail"
              name="email"
              required
              placeholder="example@gmail.com"
            />
          </div>
 
          <div class="form-group">
            <label for="regFirstName">First Name</label>
            <input
              type="text"
              id="regFirstName"
              name="firstName"
              required
              placeholder="John"
            />
          </div>
 
          <div class="form-group">
            <label for="regLastName">Last Name</label>
            <input
              type="text"
              id="regLastName"
              name="lastName"
              required
              placeholder="Doe"
            />
          </div>
 
          <div class="form-group">
            <label for="regPassword">Password</label>
            <input
              type="password"
              id="regPassword"
              name="password"
              required
              placeholder="Minimum 6 characters"
            />
          </div>
 
          <div class="form-group">
            <label for="regRole">Role</label>
            <select id="regRole" name="role" required>
              <option value="">Select a role</option>
              <option value="customer">Customer</option>
              <option value="admin">Admin</option>
            </select>
          </div>
 
          <div class="form-buttons">
            <button type="submit">Register</button>
            <button
              type="button"
              class="toggle-form-btn"
              onclick="toggleForms()"
            >
              Login
            </button>
          </div>
 
          <div id="registerMessage"></div>
        </form>
      </div>
 
      <!-- Login Form -->
      <div id="loginForm" class="auth-box hidden">
        <h2 class="form-title">Login</h2>
        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="loginPhoneNumber">Phone Number</label>
            <input
              type="tel"
              id="loginPhoneNumber"
              name="phoneNumber"
              required
              placeholder="+995-5XX-XXX-XXX"
            />
          </div>
 
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input
              type="password"
              id="loginPassword"
              name="password"
              required
              placeholder="Enter your password"
            />
          </div>
 
          <div class="form-buttons">
            <button type="submit">Login</button>
            <button
              type="button"
              class="toggle-form-btn"
              onclick="toggleForms()"
            >
              Register
            </button>
          </div>
 
          <div id="loginMessage"></div>
        </form>
      </div>
    </div>
 
    <script src="login.js"></script>
  </body>
</html>
